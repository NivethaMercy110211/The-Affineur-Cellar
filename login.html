<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="Login to The Affineur Cellar — Access your account, track orders, and manage cellar preferences."/>
  <title>Login — The Affineur Cellar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <script>!function(){var t=localStorage.getItem('acTheme')||'light',d=localStorage.getItem('acDir')||'ltr';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('dir',d)}()</script>
</head>
<body>

<!-- ===== FLOATING TOGGLES ===== -->
<div class="auth-toggles" id="auth-toggles">
  <button class="toggle-btn" id="auth-theme-toggle" data-theme-toggle aria-label="Switch theme" title="Dark Mode"></button>
  <button class="toggle-btn" id="auth-dir-toggle" data-dir-toggle aria-label="Switch direction" title="Switch to RTL"></button>
</div>

<!-- ===== AUTH PAGE ===== -->
<div class="auth-page" id="auth-page">
  <div class="auth-bg" style="background-image:url('images/hero_cave.png')"></div>
  <div class="auth-overlay"></div>

  <div class="auth-card" role="main">
    <!-- Logo -->
    <a href="index.html" class="auth-logo" aria-label="The Affineur Cellar home">
      <span class="auth-logo-icon">&#9670;</span>
      <span class="auth-logo-title">The Affineur Cellar</span>
      <span class="auth-logo-sub">Artisan Cheese Aging</span>
    </a>

    <h1 class="auth-heading">Welcome Back</h1>
    <p class="auth-sub">Sign in to your cellar account.</p>

    <form class="auth-form" id="login-form" novalidate>
      <!-- Email -->
      <div class="auth-field">
        <label for="login-email" class="auth-label">Email Address</label>
        <div class="auth-input-wrap">
          <span class="auth-input-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </span>
          <input type="email" id="login-email" name="email" class="auth-input" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <span class="auth-error" id="login-email-err" role="alert"></span>
      </div>

      <!-- Password -->
      <div class="auth-field">
        <label for="login-password" class="auth-label">Password</label>
        <div class="auth-input-wrap">
          <span class="auth-input-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          </span>
          <input type="password" id="login-password" name="password" class="auth-input" placeholder="Enter your password" required autocomplete="current-password"/>
          <button type="button" class="auth-eye" id="login-eye" aria-label="Toggle password visibility">
            <svg id="eye-show-login" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
        <span class="auth-error" id="login-password-err" role="alert"></span>
      </div>

      <!-- Remember / Forgot -->
      <div class="auth-options">
        <label class="auth-check-label" for="login-remember">
          <input type="checkbox" id="login-remember" name="remember" class="auth-checkbox"/>
          Remember me
        </label>
        <a href="forgot-password.html" class="auth-forgot">Forgot password?</a>
      </div>

      <button type="submit" class="auth-btn" id="login-submit">Sign In</button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-provider-list" aria-label="Sign in with a third-party account">
      <button type="button" class="auth-provider-btn auth-provider-google" data-login-provider="Google">
        <svg class="auth-provider-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M21.35 12.2c0-.64-.06-1.26-.16-1.86H12v3.52h5.25a4.5 4.5 0 0 1-1.95 2.95v2.28h3.16c1.85-1.7 2.89-4.21 2.89-6.89z"/>
          <path fill="#34A853" d="M12 21.75c2.64 0 4.86-.87 6.48-2.37l-3.16-2.45c-.88.59-2 .94-3.32.94-2.55 0-4.71-1.72-5.48-4.04H3.26v2.52A9.79 9.79 0 0 0 12 21.75z"/>
          <path fill="#FBBC05" d="M6.52 13.83A5.9 5.9 0 0 1 6.21 12c0-.64.11-1.26.31-1.83V7.65H3.26A9.75 9.75 0 0 0 2.25 12c0 1.57.38 3.06 1.01 4.35l3.26-2.52z"/>
          <path fill="#EA4335" d="M12 6.13c1.44 0 2.72.5 3.74 1.46l2.81-2.81A9.42 9.42 0 0 0 12 2.25a9.79 9.79 0 0 0-8.74 5.4l3.26 2.52C7.29 7.85 9.45 6.13 12 6.13z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
      <button type="button" class="auth-provider-btn auth-provider-apple" data-login-provider="Apple">
        <svg class="auth-provider-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17.05 12.54c-.03-2.39 1.95-3.55 2.04-3.61a4.4 4.4 0 0 0-3.47-1.88c-1.46-.15-2.88.87-3.62.87-.76 0-1.9-.85-3.14-.82a4.59 4.59 0 0 0-3.86 2.35c-1.68 2.91-.43 7.19 1.18 9.54.81 1.15 1.75 2.44 2.99 2.39 1.21-.05 1.66-.77 3.12-.77 1.45 0 1.87.77 3.13.74 1.3-.02 2.12-1.15 2.9-2.31a9.46 9.46 0 0 0 1.33-2.7 4.15 4.15 0 0 1-2.6-3.8zM14.67 5.5a4.24 4.24 0 0 0 .97-3.05 4.33 4.33 0 0 0-2.8 1.45 4.05 4.05 0 0 0-1 2.94 3.58 3.58 0 0 0 2.83-1.34z"/>
        </svg>
        <span>Sign in with Apple</span>
      </button>
    </div>

    <p class="auth-footer">Don't have an account? <a href="register.html">Create one</a></p>
  </div>
</div>

<script src="script.js"></script>
<script>
(function(){
  var form = document.getElementById('login-form');
  var emailInput = document.getElementById('login-email');
  var pwInput = document.getElementById('login-password');
  var emailErr = document.getElementById('login-email-err');
  var pwErr = document.getElementById('login-password-err');
  var eyeBtn = document.getElementById('login-eye');
  var providerBtns = document.querySelectorAll('[data-login-provider]');

  // Toggle password visibility
  if(eyeBtn) {
    eyeBtn.addEventListener('click', function(){
      var t = pwInput.type === 'password' ? 'text' : 'password';
      pwInput.type = t;
      eyeBtn.innerHTML = t === 'text'
        ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>'
        : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
    });
  }

  // Simple validation
  if(form) {
    form.addEventListener('submit', function(e){
      e.preventDefault();
      var ok = true;
      var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRe.test(emailInput.value.trim())) {
        emailErr.textContent = 'Please enter a valid email address.';
        emailInput.style.borderColor = '#e07070';
        ok = false;
      } else {
        emailErr.textContent = '';
        emailInput.style.borderColor = '';
      }
      if(pwInput.value.length < 1) {
        pwErr.textContent = 'Please enter your password.';
        pwInput.style.borderColor = '#e07070';
        ok = false;
      } else {
        pwErr.textContent = '';
        pwInput.style.borderColor = '';
      }
      if(ok) {
        var btn = document.getElementById('login-submit');
        btn.textContent = 'Signing In…';
        btn.disabled = true;
        setTimeout(function(){ window.location.href = 'index.html'; }, 1200);
      }
    });
  }

  providerBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      var provider = btn.getAttribute('data-login-provider');
      providerBtns.forEach(function(providerBtn){ providerBtn.disabled = true; });
      btn.querySelector('span').textContent = 'Connecting to ' + provider + '…';
      setTimeout(function(){ window.location.href = 'index.html'; }, 1000);
    });
  });
})();
</script>
</body>
</html>
